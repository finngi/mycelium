name: publish

# Publishing is downstream of the deliberate release gate: release-please's
# workflow is manual-only, and merging its release PR publishes the GitHub
# release, which triggers this. workflow_dispatch exists for re-publishing a
# build that failed after the release event already fired (PyPI rejects
# duplicate versions, so re-running a successful publish is a safe no-op fail).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC): PyPI's publisher for mcm-mycelium is scoped to
    # this repo + this workflow file + this environment. No token secrets.
    environment:
      name: pypi
      url: https://pypi.org/p/mcm-mycelium
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # A poisoned cache entry must never feed a build that ships to PyPI.
          enable-cache: false
      - run: uv build
      - run: uv publish --trusted-publishing always
