name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Code scanning needs GitHub Advanced Security, which private repos on a
    # personal plan don't have -- the analysis runs but the SARIF upload hard-
    # fails with "Code scanning is not enabled". Skip while private; this job
    # starts passing automatically the moment the repo is made public.
    if: ${{ github.event.repository.private == false }}
    # An explicit `permissions:` block replaces the default grants entirely,
    # not just adds to them -- contents: read must be listed too, or
    # actions/checkout can't even read the repo. actions: read lets
    # codeql-action/analyze query the workflow-run API it needs post-scan;
    # without it the run's own analysis step fails with "Resource not
    # accessible by integration".
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
