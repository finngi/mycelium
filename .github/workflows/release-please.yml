name: release-please

# Runs on every merge to main so the release PR always reflects what has
# landed. While the project is in alpha, the release PR auto-merges once
# green -- the prerelease counter then tracks merges instead of waiting on a
# manual dispatch. Leaving alpha: delete the auto-merge step and the release
# PR becomes the deliberate per-release gate again.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # RELEASE_PLEASE_TOKEN lives as a secret on the `main` environment, so the
    # job must join that environment to read it (repo-level secrets would work
    # without this, but the token was scoped to the environment). A real PAT,
    # not GITHUB_TOKEN, so the release PR it opens can trigger the required CI
    # checks (GITHUB_TOKEN-authored PRs don't).
    environment: main
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # Alpha-only: queue the release PR to merge itself when checks pass.
      # Merging it cuts the tag + GitHub Release, which triggers publish.yml.
      - name: Enable auto-merge on the release PR (alpha flow)
        # outputs.pr is set whenever a release PR exists, including runs
        # that left it unchanged -- prs_created alone misses the re-arm case.
        if: ${{ steps.rp.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.rp.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          pr_number=$(printf '%s' "$PR_JSON" | python3 -c 'import json,sys; print(json.load(sys.stdin)["number"])')
          gh pr merge --repo "$REPO" --auto --squash "$pr_number"
