name: release-please

# Manual-only: cutting (or refreshing) the release PR is a deliberate act,
# not a side effect of every merge to main. Run it from the Actions tab when
# you want a release proposed.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # RELEASE_PLEASE_TOKEN lives as a secret on the `main` environment, so the
    # job must join that environment to read it (repo-level secrets would work
    # without this, but the token was scoped to the environment). A real PAT,
    # not GITHUB_TOKEN, so the release PR it opens can trigger the required CI
    # checks (GITHUB_TOKEN-authored PRs don't).
    environment: main
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # No auto-merge: the release PR is the deliberate "ship it" gate. Review
      # and merge it by hand (as admin) when you want to cut -- especially once
      # a PyPI publish workflow makes merging it publish.
