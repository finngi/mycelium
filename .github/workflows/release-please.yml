name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      # Auto-merge needs a real PAT: PRs opened under the default GITHUB_TOKEN
      # identity gate every CI check behind a manual "Approve and run", so
      # required checks never go green on their own and auto-merge never fires.
      # Until a RELEASE_PLEASE_TOKEN secret is set, fall back to GITHUB_TOKEN --
      # release PRs still open, they just need a manual merge.
      HAS_PAT: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Enable auto-merge on the release PR(s)
        if: ${{ steps.release.outputs.prs_created == 'true' && env.HAS_PAT == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          for number in $(echo "$RELEASE_PRS" | jq -r '.[].number'); do
            gh pr merge --auto --squash "$number" --repo ${{ github.repository }}
          done
