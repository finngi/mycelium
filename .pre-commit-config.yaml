# Runs locally (`pre-commit install`) and on every PR via pre-commit.ci, which
# also opens weekly autoupdate PRs bumping the `rev`s below.
ci:
  autoupdate_schedule: weekly

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # rayjob.yaml is a Jinja template ({{gpu_node_selector}} etc.), not
        # valid YAML until enoki renders it -- a plain YAML parse can't load it.
        exclude: ^packages/enoki/jobs/rayjob\.yaml$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
