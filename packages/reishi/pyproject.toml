[project]
name = "reishi"
version = "0.1.1"
description = "reishi (mcm) — experiment contract layer for small-model training on KubeRay"
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0.3"]

[project.scripts]
mcm = "reishi.cli:main"

[dependency-groups]
dev = ["pytest>=9.1.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reishi"]
