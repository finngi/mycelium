[project]
name = "reishi"
version = "0.3.0"
description = "reishi (mcm) — experiment contract layer for small-model training on KubeRay"
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0.3"]

[project.scripts]
mcm = "reishi.cli:main"

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pytest>=9.1.1",
    "types-pyyaml>=6.0.12.20260518",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reishi"]
