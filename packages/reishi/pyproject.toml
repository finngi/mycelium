[project]
name = "reishi"
version = "0.6.1"
description = "reishi (mcm) — the experiment contract layer for small-model training"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Finn Danger Cathersides" }]
classifiers = ["Development Status :: 3 - Alpha"]
dependencies = ["pyyaml>=6.0.3"]

# `reishi-admin`, not `mcm`: reishi is the contract library, not the access
# point. The user-facing `mcm` command belongs to whatever deployment imports
# reishi and runs its CLI (see the mcm-lab workspace). This dev-only script
# exists just to exercise the contract standalone.
[project.scripts]
reishi-admin = "reishi.cli:main"

[dependency-groups]
dev = [
    "mypy>=2.2.0",
    "pytest>=9.1.1",
    "types-pyyaml>=6.0.12.20260518",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reishi"]
