[project]
name = "mcm"
version = "0.1.0"
description = "mycelium (mcm) — experiment contract layer for small-model training on KubeRay"
requires-python = ">=3.11"
dependencies = ["pyyaml>=6"]

[project.scripts]
mcm = "mcm.cli:main"

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcm"]
