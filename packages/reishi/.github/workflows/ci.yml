name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uvx ruff check .

  test:
    runs-on: ubuntu-latest
    # experiment_submit reads enoki's RayJob template, so its tests need
    # mcm-enoki checked out as a sibling (ENOKI_HOME's default layout).
    defaults:
      run:
        working-directory: mcm-reishi
    steps:
      - uses: actions/checkout@v4
        with:
          path: mcm-reishi
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mcm-enoki
          path: mcm-enoki
          token: ${{ secrets.MCM_SIBLING_REPO_TOKEN }}
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv venv && uv pip install -e . --group dev
      - run: uv run pytest -q
