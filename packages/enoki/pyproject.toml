[project]
name = "enoki"
version = "0.1.0"
description = "enoki — KubeRay (cloud) execution layer for mcm recipes"
requires-python = ">=3.11"
dependencies = ["mcm", "pyyaml>=6"]

[dependency-groups]
dev = ["pytest>=8"]
# Only the training image needs Ray/Postgres/the LoRA trainer stack; keep
# laptops light.
#
# torch is pinned explicitly and sourced from PyTorch's own cu124 index
# (below) rather than left to float on PyPI: with no pin, an unconstrained
# resolve lands on torch's PyPI wheel, which as of writing bundles CUDA
# 13.0 (nvidia-*-cu13) -- not the 12.4 this Dockerfile's base image
# (nvidia/cuda:12.4.1-runtime-ubuntu22.04) matches, and CUDA 13.0 needs a
# newer minimum GPU driver (>=580.65.06 vs 12.4's >=550.54.14) than what's
# been exercised on this cluster's node pools. Pinning to a cu124 build
# keeps a single, known-good CUDA version end to end and avoids shipping
# two mismatched CUDA runtimes (base image + pip) in the same image.
#
# transformers/peft/accelerate get upper bounds too: an unconstrained
# `transformers>=4.46` floor resolved to `transformers==5.13.0` (its first
# major bump in 5 years, with breaking API changes) the moment this was
# checked, entirely unpinned and unannounced by any change here. Bounding
# to the 4.x line that was actually exercised avoids a future rebuild
# silently picking up a breaking major version.
cluster = [
    "torch==2.4.1",
    "ray[default]>=2.9",
    "psycopg[binary]>=3.1",
    "transformers>=4.46,<5",
    "peft>=0.13,<0.14",
    "accelerate>=0.34,<1",
    "google-cloud-storage>=2.18",
]

[tool.uv.sources]
mcm = { path = "../mcm-reishi", editable = true }
torch = [{ index = "pytorch-cu124" }]

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/enoki"]
