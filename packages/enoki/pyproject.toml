[project]
name = "hyphae"
version = "0.1.0"
description = "hyphae — KubeRay execution layer for mcm recipes"
requires-python = ">=3.11"
dependencies = ["mcm", "pyyaml>=6"]

[dependency-groups]
dev = ["pytest>=8"]
# Only the training image needs Ray; keep laptops light.
cluster = ["ray[default]>=2.9"]

[tool.uv.sources]
mcm = { path = "../mycelium", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hyphae"]
