name: ci

# Lints and tests the base package only -- the `cluster` dependency group
# (torch/ray/transformers/...) is GPU-oriented and only ever installed in
# the training image; trainers.train_l4 imports it lazily so this stays
# meaningful without it.
on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: mcm-enoki

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mcm-enoki
      - uses: astral-sh/setup-uv@v3
      # uvx runs ruff in its own isolated env -- unlike `uv run`, it never
      # tries to sync this project's own deps (the ../mcm-reishi path dep
      # isn't checked out in this job).
      - run: uvx ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mcm-enoki
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mcm-reishi
          path: mcm-reishi
          token: ${{ secrets.MCM_SIBLING_REPO_TOKEN }}
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv venv && uv pip install -e . --group dev
      - run: uv run pytest -q
