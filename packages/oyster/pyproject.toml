[project]
name = "oyster"
version = "0.1.1"
description = "oyster — self-hosted Mac mesh execution layer for mcm (GH Actions transport, pull-based claims)"
requires-python = ">=3.11"
dependencies = ["reishi", "pyyaml>=6.0.3"]

[project.entry-points."mcm.plugins"]
oyster = "oyster.mcm_plugin"

[dependency-groups]
dev = ["pytest>=9.1.1"]

[tool.uv.sources]
reishi = { path = "../mcm-reishi", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oyster"]
