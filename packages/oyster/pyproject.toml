[project]
name = "oyster"
version = "0.3.0"
description = "oyster — self-hosted mesh execution layer for mcm (GH Actions transport, pull-based claims)"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "reishi>=0.4,<0.5",
    "pyyaml>=6.0.3",
    # MLX training backend -- Apple Silicon only. Pinned: mlx_lora.py reaches
    # into mlx_lm.lora internals (run(), the SimpleNamespace args shape).
    "mlx ; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "huggingface-hub>=1.21.0 ; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "mlx-lm==0.31.3 ; sys_platform == 'darwin' and platform_machine == 'arm64'",
    # transformers>=5.13 breaks mlx_lm.tokenizer_utils's AutoTokenizer.register()
    # call ('str' object has no attribute '__module__').
    "transformers==5.12.1 ; sys_platform == 'darwin' and platform_machine == 'arm64'",
]

[project.entry-points."mcm.plugins"]
oyster = "oyster.mcm_plugin"

[dependency-groups]
dev = [
    "mypy>=2.2.0",
    "pytest>=9.1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/oyster"]
