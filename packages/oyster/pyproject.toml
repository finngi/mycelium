[project]
name = "mat"
version = "0.1.0"
description = "mat — self-hosted Mac mesh execution layer for mcm (GH Actions transport, pull-based claims)"
requires-python = ">=3.11"
dependencies = ["mcm", "pyyaml>=6"]

[project.entry-points."mcm.plugins"]
mat = "mat.mcm_plugin"

[dependency-groups]
dev = ["pytest>=8"]

[tool.uv.sources]
mcm = { path = "../mycelium", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mat"]
