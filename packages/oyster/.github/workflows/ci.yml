name: ci

# Lint + test only. herder.yml / reaper.yml / worker.yml are the mesh's
# own orchestration jobs, not touched here.
on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: mcm-oyster

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mcm-oyster
      - uses: astral-sh/setup-uv@v3
      - run: uv run --with ruff ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mcm-oyster
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mcm-reishi
          path: mcm-reishi
          token: ${{ secrets.MCM_SIBLING_REPO_TOKEN }}
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv venv && uv pip install -e . --group dev
      - run: uv run pytest -q
