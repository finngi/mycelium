[project]
name = "physarum"
version = "0.3.0"
description = "physarum (mcm) — Optuna hyperparameter-search adaptor for mcm sweeps"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Finn Danger Cathersides" }]
dependencies = [
    "reishi>=0.4,<0.5",
    "optuna>=4.9.0",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
# Only needed to actually run a sweep whose template targets accelerator: mlx.
mlx = ["oyster>=0.3,<0.4"]
# Only needed to actually run a sweep whose template targets accelerator: local.
local = ["trafilatura>=2.1.0"]

[project.entry-points."mcm.plugins"]
physarum = "physarum.mcm_plugin"

[dependency-groups]
dev = [
    "mypy>=2.2.0",
    "pytest>=9.1.1",
    "types-pyyaml>=6.0.12.20260518",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/physarum"]
