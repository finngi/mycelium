[project]
name = "physarum"
version = "0.1.0"
description = "physarum (mcm) — Optuna hyperparameter-search adaptor for mcm sweeps"
requires-python = ">=3.11"
dependencies = [
    "reishi",
    "optuna>=4.9.0",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
# Only needed to actually run a sweep whose template targets accelerator: mlx.
mlx = ["oyster"]
# Only needed to actually run a sweep whose template targets accelerator: local.
local = ["trafilatura>=2.0.0"]

[project.entry-points."mcm.plugins"]
physarum = "physarum.mcm_plugin"

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pytest>=9.1.1",
    "types-pyyaml>=6.0.12.20260518",
]

[tool.uv.sources]
reishi = { path = "../mcm-reishi", editable = true }
oyster = { path = "../mcm-oyster", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/physarum"]
