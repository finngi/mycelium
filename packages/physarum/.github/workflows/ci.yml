name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      # uvx runs ruff in its own isolated env -- unlike `uv run`, it never
      # tries to sync this project's own deps (the ../mcm-reishi path dep
      # isn't checked out in this job).
      - run: uvx ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: mcm-physarum
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/mcm-reishi
          path: mcm-reishi
          token: ${{ secrets.MCM_SIBLING_REPO_TOKEN }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - working-directory: mcm-physarum
        run: uv venv && uv pip install -e . --group dev
      - working-directory: mcm-physarum
        run: uv run pytest -q
